name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore dependencies
        run: dotnet restore SigilLauncher.sln -p:Platform=x64

      - name: Build
        run: msbuild SigilLauncher.sln -p:Configuration=Debug -p:Platform=x64 -nologo

      - name: Build release
        run: msbuild SigilLauncher.sln -p:Configuration=Release -p:Platform=x64 -nologo

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore test dependencies
        run: dotnet restore SigilLauncher.Tests/SigilLauncher.Tests.csproj

      - name: Build tests
        run: dotnet build SigilLauncher.Tests/SigilLauncher.Tests.csproj -c Debug --no-restore

      - name: Run tests
        run: dotnet test SigilLauncher.Tests/SigilLauncher.Tests.csproj -c Debug --no-restore --verbosity normal
